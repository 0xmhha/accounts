name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.12"
          check-latest: false
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "unformatted files:"; echo "$out"; exit 1; fi
      - name: vet
        run: go vet ./...
      - name: test (incl. conformance golden vectors)
        run: go test -race ./...
